---
# L057: Wrong module FQCN — community.general.sysctl does not exist (sysctl is ansible.posix).
# Isolated so site.yml can pass syntax-check and get full validation.
- hosts: localhost
  tasks:
    - name: Manage a sysctl value (wrong collection)
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: absent
        sysctl_set: not_a_bool

    # L007/L029: shell instead of command (no shell features)
    # L013: no changed_when
    # L046: free-form command
    - name: get the hostname
      shell: hostname

    # L006: command where a module exists
    # L013: no changed_when
    - name: read the hosts file
      command: cat /etc/hosts

    # L002/L026/L030: short module name, not FQCN, not builtin
    # L021: no mode on copy
    # L017: relative path in src
    - name: copy a config file
      copy:
        src: files/app.conf
        dest: /etc/app/app.conf

    # L020: numeric mode (not string)
    - name: set permissions on the app directory
      file:
        path: /opt/app
        state: directory
        mode: 755

    - name: Use the broken role
      ansible.builtin.include_role:
        name: broken_role
